name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packs/enforra-node/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install pack dependencies
        run: npm ci --prefix packs/enforra-node

      - name: Run unit and security tests
        run: npm test

      - name: Build guest image
        run: docker build -t enforra-node:ci packs/enforra-node
