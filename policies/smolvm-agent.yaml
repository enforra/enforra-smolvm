version: 1

defaults:
  decision: block

policies:
  # 1. Block destructive pack run
  - id: block-dangerous-pack-run
    priority: 5
    match:
      agent: infra-agent
      tool: smolvm.pack.run
    conditions:
      - field: args.command
        operator: contains
        value: "rm -rf"
    decision: block

  # 2. Block destructive machine run
  - id: block-dangerous-machine-run
    priority: 6
    match:
      agent: infra-agent
      tool: smolvm.machine.run.from_registry_pack
    conditions:
      - field: args.command
        operator: contains
        value: "rm -rf"
    decision: block

  # 3. Allow approved registry inspect
  - id: allow-approved-registry-inspect
    priority: 10
    match:
      agent: infra-agent
      tool: smolvm.pack.inspect
    conditions:
      - field: args.reference
        operator: eq
        value: "registry.smolmachines.com/library/codex:arm64"
    decision: allow

  # 4. Allow approved registry pull
  - id: allow-approved-registry-pull
    priority: 20
    match:
      agent: infra-agent
      tool: smolvm.pack.pull
    conditions:
      - field: args.reference
        operator: eq
        value: "registry.smolmachines.com/library/codex:arm64"
    decision: allow

  # 5. Allow approved pack run (by source reference)
  - id: allow-approved-pack-run
    priority: 30
    match:
      agent: infra-agent
      tool: smolvm.pack.run
    conditions:
      - field: args.sourceReference
        operator: eq
        value: "registry.smolmachines.com/library/codex:arm64"
    decision: allow

  # 6. Allow approved machine run (by source reference)
  - id: allow-approved-machine-run
    priority: 40
    match:
      agent: infra-agent
      tool: smolvm.machine.run.from_registry_pack
    conditions:
      - field: args.sourceReference
        operator: eq
        value: "registry.smolmachines.com/library/codex:arm64"
    decision: allow

  # 7. Require approval for unknown registry pull
  - id: approval-for-unknown-registry-pull
    priority: 80
    match:
      agent: infra-agent
      tool: smolvm.pack.pull
    conditions:
      - field: args.reference
        operator: contains
        value: "registry.smolmachines.com"
    decision: require_approval

  # 8. Require approval for unknown pack run sourceReference
  - id: approval-for-unknown-pack-run
    priority: 90
    match:
      agent: infra-agent
      tool: smolvm.pack.run
    conditions:
      - field: args.sourceReference
        operator: eq
        value: "unknown"
    decision: require_approval

  # 9. Require approval for unknown machine run sourceReference
  - id: approval-for-unknown-machine-run
    priority: 100
    match:
      agent: infra-agent
      tool: smolvm.machine.run.from_registry_pack
    conditions:
      - field: args.sourceReference
        operator: eq
        value: "unknown"
    decision: require_approval

  # 10. Block unsupported commands by default
  - id: block-unsupported-commands
    priority: 110
    match:
      agent: infra-agent
      tool: smolvm.unsupported
    decision: block